services:
  - name: job-assistant-bot
    type: web
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: WEBHOOK_PATH
        value: /telegram
      - key: WEBHOOK_LISTEN
        value: 0.0.0.0
      - key: JOB_RESULTS_LIMIT
        value: 5
