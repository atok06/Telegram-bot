services:
  - name: atok-bot
    type: web
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: xiaomi/mimo-v2-omni
      - key: WEBHOOK_PATH
        value: /telegram
      - key: WEBHOOK_LISTEN
        value: 0.0.0.0
